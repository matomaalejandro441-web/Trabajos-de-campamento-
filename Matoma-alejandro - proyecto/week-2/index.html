<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏢 Plataforma de Crowdfunding Inmobiliario</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">

    <!-- Header -->
    <header class="header">
      <h1>🏢 Proyectos de Crowdfunding Inmobiliario</h1>
      <p class="subtitle">Gestiona oportunidades de inversión inmobiliaria</p>
      <div class="stats-summary" id="stats-summary">
        <span class="stat">Total Proyectos: <strong id="stat-total">0</strong></span>
        <span class="stat">Activos: <strong id="stat-active">0</strong></span>
        <span class="stat">Finalizados: <strong id="stat-inactive">0</strong></span>
      </div>
    </header>

    <!-- Formulario -->
    <section class="form-section">
      <h2 id="form-title">➕ Nuevo Proyecto</h2>
      <form id="item-form" class="item-form">
        <input type="hidden" id="item-id" value="">

        <div class="form-group">
          <label for="item-name">Nombre del Proyecto *</label>
          <input
            type="text"
            id="item-name"
            placeholder="Ej: Torre Empresarial Centro"
            required
          >
        </div>

        <div class="form-group">
          <label for="item-description">Descripción</label>
          <textarea
            id="item-description"
            rows="3"
            placeholder="Describe el proyecto inmobiliario"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="item-category">Tipo de Proyecto</label>
            <select id="item-category">
              <option value="residential">🏠 Residencial</option>
              <option value="commercial">🏢 Comercial</option>
              <option value="industrial">🏭 Industrial</option>
              <option value="mixed">🏬 Uso Mixto</option>
            </select>
          </div>

          <div class="form-group">
            <label for="item-priority">Nivel de Riesgo</label>
            <select id="item-priority">
              <option value="low">🟢 Bajo</option>
              <option value="medium" selected>🟡 Medio</option>
              <option value="high">🔴 Alto</option>
            </select>
          </div>
        </div>

        <!-- Campo adicional específico del dominio -->
        <div class="form-group">
          <label for="item-amount">Meta de Inversión (USD)</label>
          <input
            type="number"
            id="item-amount"
            placeholder="Ej: 500000"
          >
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">
            Crear Proyecto
          </button>
          <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">
            Cancelar
          </button>
        </div>
      </form>
    </section>

    <!-- Filtros -->
    <section class="filters-section">
      <div class="filters">
        <div class="filter-group">
          <label for="filter-status">Estado:</label>
          <select id="filter-status">
            <option value="all">Todos</option>
            <option value="active">Activos</option>
            <option value="inactive">Finalizados</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-category">Tipo:</label>
          <select id="filter-category">
            <option value="all">Todos</option>
            <option value="residential">Residencial</option>
            <option value="commercial">Comercial</option>
            <option value="industrial">Industrial</option>
            <option value="mixed">Uso Mixto</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-priority">Riesgo:</label>
          <select id="filter-priority">
            <option value="all">Todos</option>
            <option value="high">Alto</option>
            <option value="medium">Medio</option>
            <option value="low">Bajo</option>
          </select>
        </div>

        <div class="filter-group search-group">
          <label for="search-input">Buscar:</label>
          <input
            type="text"
            id="search-input"
            placeholder="Buscar proyectos..."
          >
        </div>
      </div>
    </section>

    <!-- Lista -->
    <section class="items-section">
      <div class="items-header">
        <h2>📋 Lista de Proyectos</h2>
        <button class="btn btn-outline" id="clear-inactive">
          🗑️ Eliminar Finalizados
        </button>
      </div>

      <div id="item-list" class="item-list"></div>

      <div id="empty-state" class="empty-state">
        <p>📭 No hay proyectos registrados</p>
        <p class="empty-state-hint">Crea tu primer proyecto arriba</p>
      </div>
    </section>

    <!-- Estadísticas -->
    <section class="detailed-stats">
      <h3>📊 Estadísticas de Inversión</h3>
      <div id="stats-details" class="stats-grid"></div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
